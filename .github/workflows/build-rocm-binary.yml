name: Build ROCm Binary

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build_rocm_binary:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build ROCm binary container
        run: |
          docker build -t mmseqs-rocm-builder -f .github/workflows/Dockerfile.GPU-debian-slim-rocm7 .

      - name: Extract mmseqs binary
        run: |
          mkdir -p output
          docker run --rm --entrypoint /bin/bash -v "$PWD/output:/output" mmseqs-rocm-builder -lc 'cp /opt/mmseqs/bin/mmseqs /output/'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmseqs-linux-rocm-x86_64
          path: output/mmseqs
